<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dake视频自动化 - 登录</title>
    <!-- 徽标 - 现代渐变风格DK图标 -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-size='42' text-anchor='middle' fill='white' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif' font-weight='800' letter-spacing='-2'%3EDK%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            font-weight: bold;
            color: white;
        }
        
        .logo h1 {
            color: #f1f5f9;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.5);
        }
        
        /* 账号提示横幅 */
        .credentials-banner {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            border: 2px dashed rgba(99, 102, 241, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .banner-title {
            color: #a5b4fc;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .credentials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .credential-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 10px;
            padding: 12px 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .credential-item:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
            transform: translateY(-2px);
        }
        
        .credential-user {
            color: #f1f5f9;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .credential-pass {
            color: #a5b4fc;
            font-family: monospace;
            font-size: 12px;
            background: rgba(99, 102, 241, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .banner-hint {
            color: #64748b;
            font-size: 12px;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .user-hint {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        .user-hint h3 {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .user-item .name {
            font-weight: 600;
            color: #e2e8f0;
            min-width: 60px;
        }
        
        .user-item .pass {
            font-family: monospace;
            background: rgba(99, 102, 241, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            color: #a5b4fc;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">DK</div>
            <h1>Dake视频自动化</h1>
            <p>小红书视频下载与剪辑工具</p>
        </div>
        
        <div class="error-message" id="errorMsg"></div>
        
        <!-- 账号提示横幅 -->
        <div class="credentials-banner">
            <div class="banner-title">👇 请使用以下账号登录</div>
            <div class="credentials-grid">
                <div class="credential-item" onclick="fillCredentials('user_a', 'pass_a')">
                    <div class="credential-user">用户 A</div>
                    <div class="credential-pass">pass_a</div>
                </div>
                <div class="credential-item" onclick="fillCredentials('user_b', 'pass_b')">
                    <div class="credential-user">用户 B</div>
                    <div class="credential-pass">pass_b</div>
                </div>
                <div class="credential-item" onclick="fillCredentials('user_c', 'pass_c')">
                    <div class="credential-user">用户 C</div>
                    <div class="credential-pass">pass_c</div>
                </div>
            </div>
            <div class="banner-hint">点击上方卡片自动填充</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <select id="username" name="username" required>
                    <option value="">选择用户</option>
                    <option value="user_a">用户 A</option>
                    <option value="user_b">用户 B</option>
                    <option value="user_c">用户 C</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="btn-login">登录</button>
        </form>
    </div>
    
    <script>
        // 自动填充账号密码
        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            
            // 高亮选中的卡片
            document.querySelectorAll('.credential-item').forEach(item => {
                item.style.background = 'rgba(15, 23, 42, 0.6)';
                item.style.borderColor = 'rgba(99, 102, 241, 0.3)';
            });
            
            event.currentTarget.style.background = 'rgba(99, 102, 241, 0.4)';
            event.currentTarget.style.borderColor = '#6366f1';
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/app';
                } else {
                    errorMsg.textContent = data.error || '登录失败';
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                errorMsg.textContent = '网络错误，请重试';
                errorMsg.classList.add('show');
            }
        });
    </script>
</body>
</html>
