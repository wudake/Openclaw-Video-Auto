<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dake视频自动化工具</title>
    <!-- 徽标 - 现代渐变风格DK图标 -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-size='42' text-anchor='middle' fill='white' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif' font-weight='800' letter-spacing='-2'%3EDK%3C/text%3E%3C/svg%3E">

    <!-- 苹果设备图标 -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Ctext x='90' y='122' font-size='76' text-anchor='middle' fill='white' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif' font-weight='800' letter-spacing='-4'%3EDK%3C/text%3E%3C/svg%3E">

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.8);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
            position: relative;
        }

        .user-bar {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.9em;
        }

        .user-bar .username {
            color: var(--accent);
            font-weight: 600;
        }

        .user-bar .btn-logout {
            padding: 6px 12px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }

        .user-bar .btn-logout:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        }

        .header h1 {
            font-size: 2.8em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1em;
            margin-top: 10px;
        }

        /* 卡片 */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .card-title {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-number {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        /* 输入框 */
        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            color: var(--text);
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        /* 按钮 */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5);
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.2);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 任务队列卡片 */
        .task-queue-card {
            border-left: 4px solid var(--primary);
        }

        .queue-badge {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }

        .queue-status {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .queue-item {
            text-align: center;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .queue-label {
            display: block;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .queue-value {
            font-size: 24px;
            font-weight: 700;
        }

        .queue-value.pending { color: #f59e0b; }
        .queue-value.running { color: #3b82f6; }
        .queue-value.completed { color: var(--success); }

        .current-task {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .task-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .task-type {
            color: var(--text);
            font-weight: 600;
        }

        .task-status {
            color: var(--accent);
            font-size: 14px;
        }

        .progress-bar {
            height: 8px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .task-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .task-item:last-child {
            margin-bottom: 0;
        }

        .task-item-type {
            color: var(--text);
        }

        .task-item-status {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .task-item-status.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .task-item-status.running {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .task-item-status.success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .task-item-status.failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        /* 加载动画 */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 状态提示 */
        .status {
            padding: 16px 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status.show { display: block; }

        /* 选项网格 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-item:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }

        .option-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }

        /* 滑块 */
        .range-group {
            margin-bottom: 24px;
        }

        .range-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .range-value {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 12px;
            height: 6px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.3);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        /* 视频预览 */
        .preview-video {
            width: 100%;
            max-width: 350px;
            border-radius: 16px;
            margin: 20px 0;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* 按钮组 */
        .action-buttons {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .hidden { display: none !important; }

        /* 分区标题 */
        .section-title {
            font-weight: 700;
            color: var(--text);
            margin: 28px 0 16px 0;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 1.1em;
        }

        /* 选择框 */
        .select-box {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            color: var(--text);
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeInUp 0.6s ease;
        }

        /* 文件列表 */
        .file-list { margin-top: 16px; }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container { padding: 20px 16px; }
            .header h1 { font-size: 2em; }
            .card { padding: 24px; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">DK</div>
            </div>
            <h1>Dake视频自动化工具</h1>
            <p>小红书视频下载 · 智能剪辑 · 一键导出</p>
        </div>

        <!-- 步骤 1: 下载 -->
        <div class="card" id="step1">
            <div class="card-title">
                <span class="step-number">1</span>
                下载小红书视频
            </div>
            <div class="input-group">
                <label>小红书视频链接</label>
                <input type="text" id="xhs-url" placeholder="https://www.xiaohongshu.com/explore/...">
            </div>

            <button class="btn btn-primary" id="btn-download" onclick="downloadVideo()">
                <span>开始下载</span>
            </button>
            <div class="status" id="download-status"></div>
        </div>

        <!-- 步骤 2: 剪辑配置 -->
        <div class="card hidden" id="step2">
            <div class="card-title">
                <span class="step-number">2</span>
                剪辑配置
            </div>

            <!-- Logo -->
            <div class="section-title">📁 Logo 设置</div>
            <div class="input-group">
                <div class="upload-area" onclick="document.getElementById('logo-file').click()">
                    <p>📤 点击上传 Logo (PNG)</p>
                    <input type="file" id="logo-file" accept=".png" style="display:none" onchange="uploadLogo(this)">
                </div>
            </div>

            <div class="input-group">
                <label>选择 Logo</label>
                <select id="logo-select" class="select-box">
                    <option value="">-- 请选择 --</option>
                </select>
            </div>

            <!-- BGM -->
            <div class="section-title">🎵 BGM 设置</div>
            <div class="input-group">
                <div class="upload-area" onclick="document.getElementById('bgm-file').click()">
                    <p>🎼 点击上传 BGM (MP3)</p>
                    <input type="file" id="bgm-file" accept=".mp3,.m4a" style="display:none" onchange="uploadBgm(this)">
                </div>
            </div>

            <div class="input-group">
                <label>选择 BGM</label>
                <select id="bgm-select" class="select-box">
                    <option value="">-- 请选择 --</option>
                </select>
            </div>

            <!-- 音频设置 -->
            <div class="section-title">🔊 音频设置</div>

            <div class="options-grid">
                <label class="option-item">
                    <input type="checkbox" id="opt-replace-audio">
                    <span>使用 BGM 替换原声</span>
                </label>
            </div>

            <div class="range-group">
                <label>
                    原声音量
                    <span class="range-value" id="orig-vol-value">100%</span>
                </label>
                <input type="range" id="original-volume" min="0" max="2" step="0.1" value="1"
                       oninput="document.getElementById('orig-vol-value').textContent=Math.round(this.value*100)+'%'">
            </div>

            <div class="range-group">
                <label>
                    BGM 音量
                    <span class="range-value" id="bgm-vol-value">80%</span>
                </label>
                <input type="range" id="bgm-volume" min="0" max="2" step="0.1" value="0.8"
                       oninput="document.getElementById('bgm-vol-value').textContent=Math.round(this.value*100)+'%'">
            </div>

            <!-- 视频效果 -->
            <div class="section-title">🎨 视频效果</div>
            
            <div class="options-grid">
                <label class="option-item">
                    <input type="checkbox" id="opt-hflip" checked>
                    <span>水平镜像</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="opt-crop" checked>
                    <span>裁剪首尾</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="opt-color" checked>
                    <span>调色优化</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="opt-zoom" checked>
                    <span>智能缩放</span>
                </label>
            </div>
            
            <!-- 裁剪时间设置 -->
            <div class="input-group" id="crop-time-settings" style="margin-top: 15px; padding: 15px; background: rgba(15, 23, 42, 0.5); border-radius: 10px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label style="font-size: 13px; color: var(--text-muted);">去除头部 (秒)</label>
                        <input type="number" id="crop-head-time" class="select-box" value="0.5" min="0" max="10" step="0.1" style="width: 100%; margin-top: 5px; padding: 10px;">
                    </div>
                    <div>
                        <label style="font-size: 13px; color: var(--text-muted);">去除尾部 (秒)</label>
                        <input type="number" id="crop-tail-time" class="select-box" value="0.5" min="0" max="10" step="0.1" style="width: 100%; margin-top: 5px; padding: 10px;">
                    </div>
                </div>
            </div>

            <div class="range-group">
                <label>
                    播放速度
                    <span class="range-value" id="speed-value">1.05x</span>
                </label>
                <input type="range" id="speed" min="0.8" max="2.0" step="0.05" value="1.05"
                       oninput="document.getElementById('speed-value').textContent=this.value+'x'">
            </div>

            <div class="range-group">
                <label>
                    Logo 大小
                    <span class="range-value" id="logo-size-value">10%</span>
                </label>
                <input type="range" id="logo-size" min="0.05" max="0.3" step="0.01" value="0.10"
                       oninput="document.getElementById('logo-size-value').textContent=Math.round(this.value*100)+'%'">
            </div>

            <div class="input-group">
                <label>Logo 位置</label>
                <select id="logo-position" class="select-box">
                    <option value="top_left" selected>左上角</option>
                    <option value="top_right">右上角</option>
                    <option value="bottom_left">左下角</option>
                    <option value="bottom_right">右下角</option>
                    <option value="bottom_center">底部居中</option>
                </select>
            </div>

            <!-- 字幕设置 -->
            <div class="section-title">📝 字幕设置</div>
            
            <div class="options-grid">
                <label class="option-item">
                    <input type="checkbox" id="opt-subtitles">
                    <span>添加字幕</span>
                </label>
            </div>
            
            <!-- 字幕配置面板 -->
            <div id="subtitle-config-panel" style="display: none; padding: 20px; background: rgba(15, 23, 42, 0.5); border-radius: 12px; margin-bottom: 20px;">
                
                <div class="input-group">
                    <label>字幕内容</label>
                    <textarea id="subtitle-text" rows="2" placeholder="输入字幕内容，例如：Hello World" style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 10px; color: var(--text); resize: vertical;"></textarea>
                </div>
                
                <div class="input-group">
                    <label>
                        显示时间
                        <span style="color: var(--text-muted); font-size: 12px;">(秒)</span>
                    </label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="number" id="subtitle-start" class="select-box" value="0" min="0" max="60" step="0.5" placeholder="开始">
                        <input type="number" id="subtitle-end" class="select-box" value="" min="0" max="60" step="0.5" placeholder="结束(留空到结尾)">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>颜色方案</label>
                    <select id="subtitle-style" class="select-box">
                        <option value="yellow_black">黄字黑边</option>
                        <option value="white_black">白字黑边</option>
                        <option value="black_white">黑字白边</option>
                        <option value="cyan_black">青字黑边</option>
                        <option value="pink_black">粉字黑边</option>
                        <option value="white_blue">白字蓝边</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>字体大小</label>
                    <input type="number" id="subtitle-font-size" class="select-box" value="24" min="10" max="72" style="width: 100%;">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="input-group">
                        <label>垂直位置</label>
                        <select id="subtitle-position" class="select-box">
                            <option value="bottom">底部</option>
                            <option value="middle">中间</option>
                            <option value="top">顶部</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>水平对齐</label>
                        <select id="subtitle-align" class="select-box">
                            <option value="center">居中</option>
                            <option value="left">左对齐</option>
                            <option value="right">右对齐</option>
                        </select>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>描边宽度</label>
                    <select id="subtitle-outline" class="select-box">
                        <option value="1">细 (1px)</option>
                        <option value="2" selected>中 (2px)</option>
                        <option value="3">粗 (3px)</option>
                    </select>
                </div>
                
                <!-- 预览 -->
                <div style="margin-top: 15px; padding: 15px; background: rgba(0, 0, 0, 0.4); border-radius: 10px; text-align: center;">
                    <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">效果预览</div>
                    <div id="subtitle-preview" style="font-size: 24px; color: #FFD700; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; font-weight: bold; padding: 10px;">
                        Hello World
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" id="btn-edit" onclick="editVideo()">
                <span>✨ 开始剪辑</span>
            </button>
            <div class="status" id="edit-status"></div>
        </div>

        <!-- 步骤 3: 完成 -->
        <div class="card hidden" id="step3">
            <div class="card-title">
                <span class="step-number">3</span>
                剪辑完成
            </div>
            <p style="color: var(--success); font-size: 1.2em;">🎉 视频剪辑成功！</p>
            <video class="preview-video" id="preview-player" controls></video>
            <div class="action-buttons">
                <a id="download-link" class="btn btn-primary" download>⬇️ 下载视频</a>
                <button class="btn btn-secondary" onclick="location.reload()">🔄 处理下一个</button>
            </div>
        </div>
    </div>

    <script>
        let currentNoteId = null;
        let logosData = [];
        let bgmsData = [];

        function showStatus(id, msg, isError) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'status show ' + (isError ? 'error' : 'success');
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<div class="spinner"></div><span>处理中...</span>';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'btn-download' ? '<span>开始下载</span>' : '<span>✨ 开始剪辑</span>';
            }
        }

        async function loadLogos() {
            try {
                const res = await fetch('/api/logos/list');
                const data = await res.json();
                logosData = data.logos || [];
                const select = document.getElementById('logo-select');
                select.innerHTML = '<option value="">-- 请选择 --</option>';
                logosData.forEach(logo => {
                    const opt = document.createElement('option');
                    opt.value = logo.name;
                    opt.textContent = logo.name + ' (' + logo.size_kb + 'KB)';
                    select.appendChild(opt);
                });
                if (logosData.length > 0) select.value = logosData[0].name;
            } catch (e) {
                console.error('加载 Logo 失败:', e);
            }
        }

        async function loadBgms() {
            try {
                const res = await fetch('/api/bgm/list');
                const data = await res.json();
                bgmsData = data.bgms || [];
                const select = document.getElementById('bgm-select');
                select.innerHTML = '<option value="">-- 请选择 --</option>';
                bgmsData.forEach(bgm => {
                    const opt = document.createElement('option');
                    opt.value = bgm.name;
                    opt.textContent = bgm.name + ' (' + bgm.size_mb + 'MB)';
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error('加载 BGM 失败:', e);
            }
        }

        async function downloadVideo() {
            const url = document.getElementById('xhs-url').value.trim();
            if (!url) {
                showStatus('download-status', '请输入链接', true);
                return;
            }

            setLoading('btn-download', true);
            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const result = await res.json();

                if (result.success) {
                    currentNoteId = result.data.note_id;
                    showStatus('download-status', `✅ 下载成功！${result.data.size_mb}MB`);
                    await loadLogos();
                    await loadBgms();
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('step2').classList.add('fade-in');
                    document.getElementById('step2').scrollIntoView({ behavior: 'smooth' });
                } else {
                    showStatus('download-status', '❌ ' + result.error, true);
                }
            } catch (e) {
                showStatus('download-status', '❌ 网络错误', true);
            } finally {
                setLoading('btn-download', false);
            }
        }

        async function uploadLogo(input) {
            if (!input.files.length) return;
            const formData = new FormData();
            formData.append('file', input.files[0]);
            try {
                const res = await fetch('/api/upload/logo', { method: 'POST', body: formData });
                const result = await res.json();
                if (result.success) {
                    alert('✅ ' + result.message);
                    await loadLogos();
                } else {
                    alert('❌ ' + result.error);
                }
            } catch (e) {
                alert('上传失败');
            }
        }

        async function uploadBgm(input) {
            if (!input.files.length) return;
            const formData = new FormData();
            formData.append('file', input.files[0]);
            try {
                const res = await fetch('/api/upload/bgm', { method: 'POST', body: formData });
                const result = await res.json();
                if (result.success) {
                    alert('✅ ' + result.message);
                    await loadBgms();
                } else {
                    alert('❌ ' + result.error);
                }
            } catch (e) {
                alert('上传失败');
            }
        }

        // 字幕面板显示控制
        document.getElementById('opt-subtitles').addEventListener('change', function() {
            const panel = document.getElementById('subtitle-config-panel');
            panel.style.display = this.checked ? 'block' : 'none';
        });

        // 字幕效果实时预览
        function updateSubtitlePreview() {
            const style = document.getElementById('subtitle-style').value;
            const size = document.getElementById('subtitle-font-size').value || 24;
            const preview = document.getElementById('subtitle-preview');
            
            const colorMap = {
                'yellow_black': '#FFD700',
                'white_black': '#FFFFFF',
                'black_white': '#000000',
                'cyan_black': '#00FFFF',
                'pink_black': '#FF69B4',
                'white_blue': '#FFFFFF'
            };
            
            preview.style.color = colorMap[style] || '#FFD700';
            preview.style.fontSize = size + 'px';
        }
        
        document.getElementById('subtitle-style').addEventListener('change', updateSubtitlePreview);
        document.getElementById('subtitle-font-size').addEventListener('input', updateSubtitlePreview);

        async function editVideo() {
            if (!currentNoteId) {
                showStatus('edit-status', '请先下载视频', true);
                return;
            }

            const logoSelect = document.getElementById('logo-select').value;
            const bgmSelect = document.getElementById('bgm-select').value;
            const replaceAudio = document.getElementById('opt-replace-audio').checked;

            // 获取裁剪时间
            const isCropEnabled = document.getElementById('opt-crop').checked;
            const cropHeadTime = isCropEnabled ? parseFloat(document.getElementById('crop-head-time').value) || 0 : 0;
            const cropTailTime = isCropEnabled ? parseFloat(document.getElementById('crop-tail-time').value) || 0 : 0;

            // 获取字幕配置
            const addSubtitles = document.getElementById('opt-subtitles').checked;
            let subtitleConfig = {};
            
            if (addSubtitles) {
                const subtitleText = document.getElementById('subtitle-text').value.trim();
                if (!subtitleText) {
                    showStatus('edit-status', '请输入字幕内容', true);
                    return;
                }
                
                const subtitleEnd = document.getElementById('subtitle-end').value;
                
                subtitleConfig = {
                    add_subtitles: true,
                    subtitle_text: subtitleText,
                    subtitle_start: parseFloat(document.getElementById('subtitle-start').value) || 0,
                    subtitle_end: subtitleEnd ? parseFloat(subtitleEnd) : null,
                    subtitle_style: document.getElementById('subtitle-style').value,
                    subtitle_font_size: parseInt(document.getElementById('subtitle-font-size').value) || 24,
                    subtitle_position: document.getElementById('subtitle-position').value,
                    subtitle_align: document.getElementById('subtitle-align').value,
                    subtitle_outline_width: parseInt(document.getElementById('subtitle-outline').value) || 2
                };
            }

            setLoading('btn-edit', true);

            const config = {
                crop_top: cropHeadTime,
                crop_bottom: cropTailTime,
                speed: parseFloat(document.getElementById('speed').value),
                hflip: document.getElementById('opt-hflip').checked,
                zoom: document.getElementById('opt-zoom').checked ? 1.05 : 1.0,
                brightness: document.getElementById('opt-color').checked ? 0.05 : 0,
                contrast: document.getElementById('opt-color').checked ? 0.1 : 0,
                saturation: document.getElementById('opt-color').checked ? 0.05 : 0,
                add_logo: !!logoSelect,
                logo_select: logoSelect,
                logo_position: document.getElementById('logo-position').value,
                logo_size: parseFloat(document.getElementById('logo-size').value),
                replace_audio: replaceAudio,
                bgm_select: bgmSelect,
                bgm_volume: parseFloat(document.getElementById('bgm-volume').value),
                original_volume: parseFloat(document.getElementById('original-volume').value),
                ...subtitleConfig
            };

            try {
                const res = await fetch('/api/edit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note_id: currentNoteId, config })
                });
                const result = await res.json();

                if (result.success) {
                    showStatus('edit-status', '✅ 剪辑成功！');
                    document.getElementById('step3').classList.remove('hidden');
                    document.getElementById('step3').classList.add('fade-in');
                    document.getElementById('preview-player').src = result.data.preview_url;
                    document.getElementById('download-link').href = result.data.download_url;
                    window.currentVideoName = result.data.output_name;
                    document.getElementById('step3').scrollIntoView({ behavior: 'smooth' });
                } else {
                    showStatus('edit-status', '❌ ' + result.error, true);
                }
            } catch (e) {
                showStatus('edit-status', '❌ 网络错误', true);
            } finally {
                setLoading('btn-edit', false);
            }
        }
    </script>
</body>
</html>
